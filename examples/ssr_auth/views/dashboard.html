<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f7f9fc; color: #333; margin: 0; padding: 2rem;}
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto;}
        h1 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;}
        .flash-success { color: #15803d; background: #dcfce7; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem;}
        form { margin-top: 2rem; }
        button { padding: 0.5rem 1rem; background: #b91c1c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #991b1b; }
    </style>
</head>
<body>
    <div class="card">
        {{if .flash.success}}
        <div class="flash-success">{{.flash.success}}</div>
        {{end}}

        <h1>{{.Title}}</h1>
        
        <p>You are logged in securely!</p>
        <p><strong>Email:</strong> {{.Email}}</p>

        <form action="/logout" method="POST">
            <button type="submit">Log Out</button>
        </form>
    </div>
</body>
</html>
